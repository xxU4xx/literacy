<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>名簿</title>
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
            max-width: 500px;
            margin: 20px auto;
        }
        
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        
        th {
            background-color: #4CAF50;
            color: white;
            font-weight: bold;
        }
        
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        
        tr:hover {
            background-color: #ddd;
        }
    </style>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th>名前</th>
                <th>年齢</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>石川祐希</td>
                <td>30</td>
            </tr>
            <tr>
                <td>大谷翔平</td>
                <td>31</td>
            </tr>
            <tr>
                <td>レブロンジェームス</td>
                <td>41</td>
            </tr>
            <tr>
                <td>マイケルジョーダン</td>
                <td>63</td>
            </tr>
            <tr>
                <td>細野晴臣</td>
                <td>78</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
